{% extends "base.html" %} {% block content %}

<div class="container mt-5">
  <div class="card shadow-lg p-4">
    <h2 class="text-center text-primary mb-4">
      Credit Card Approval Prediction
    </h2>

    <form action="/predict" method="POST">
      <div class="row">
        <!-- Gender -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Gender</label>
          <select class="form-control" name="Gender" required>
            <option value="1">Male</option>
            <option value="0">Female</option>
          </select>
        </div>

        <!-- Age -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Age</label>
          <input
            type="number"
            step="0.01"
            class="form-control"
            name="Age"
            required
          />
        </div>

        <!-- Debt -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Debt</label>
          <input
            type="number"
            step="0.01"
            class="form-control"
            name="Debt"
            required
          />
        </div>

        <!-- Married -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Married</label>
          <select class="form-control" name="Married" required>
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>

        <!-- Bank Customer -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Bank Customer</label>
          <select class="form-control" name="BankCustomer" required>
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>

        <!-- Industry -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Industry</label>
          <select class="form-control" name="Industry" required>
            <option value="">Select Industry</option>
            <option value="CommunicationServices">
              Communication Services
            </option>
            <option value="ConsumerDiscretionary">
              Consumer Discretionary
            </option>
            <option value="ConsumerStaples">Consumer Staples</option>
            <option value="Education">Education</option>
            <option value="Energy">Energy</option>
            <option value="Financials">Financial Services</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Industrials">Industrials</option>
            <option value="InformationTechnology">
              Information Technology
            </option>
            <option value="Materials">Materials</option>
            <option value="Real Estate">Real Estate</option>
            <option value="Research">Research</option>
            <option value="Transport">Transport</option>
            <option value="Utilities">Utilities</option>
          </select>
        </div>

        <!-- Ethnicity -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Ethnicity</label>
          <select class="form-control" name="Ethnicity" required>
            <option value="">Select Ethnicity</option>
            <option value="Asian">Asian</option>
            <option value="Black">Black</option>
            <option value="Latino">Latino</option>
            <option value="Other">Other</option>
            <option value="White">White</option>
          </select>
        </div>

        <!-- Years Employed -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Years Employed</label>
          <input
            type="number"
            step="0.01"
            class="form-control"
            name="YearsEmployed"
            required
          />
        </div>

        <!-- Prior Default -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Prior Default</label>
          <select class="form-control" name="PriorDefault" required>
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>

        <!-- Employed -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Currently Employed</label>
          <select class="form-control" name="Employed" required>
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>

        <!-- Credit Score -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Credit Score</label>
          <input
            type="number"
            class="form-control"
            name="CreditScore"
            required
          />
        </div>

        <!-- Driver License -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Driver's License</label>
          <select class="form-control" name="DriversLicense" required>
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>

        <!-- Citizen -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Citizenship</label>
          <select class="form-control" name="Citizen" required>
            <option value="">Select Citizenship</option>
            <option value="ByBirth">By Birth</option>
            <option value="ByOtherMeans">By Other Means</option>
            <option value="Temporary">Temporary</option>
          </select>
        </div>

        <!-- Zip Code -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Zip Code</label>
          <input type="number" class="form-control" name="ZipCode" required />
        </div>

        <!-- Income -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Annual Income</label>
          <input type="number" class="form-control" name="Income" required />
        </div>
      </div>

      <div class="text-center mt-4">
        <button type="submit" class="btn btn-success btn-lg">
          Predict Approval
        </button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
